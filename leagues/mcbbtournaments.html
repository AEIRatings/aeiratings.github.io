<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../assets/style.css">
    <style>
        /* Adaptations for the tournament tab layout using site variables */
        body {
            background-color: var(--bg-dark, #5f5f5f);
            color: var(--text-main, #f8fafc);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .tournaments-container {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            background: var(--card-bg, rgba(30, 41, 59, 0.7));
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
        }

        .tournaments-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-main, #fff);
            font-weight: 700;
        }

        /* Tabs Header Box */
        .conf-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 2px solid var(--border, rgba(255, 255, 255, 0.1));
            margin-bottom: 20px;
            padding-bottom: 15px;
            justify-content: center;
        }

        .conf-tab {
            padding: 8px 16px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-muted, #cbd5e1);
            border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
            border-radius: 6px;
            user-select: none;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            font-size: 0.95rem;
        }

        .conf-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main, #fff);
        }

        .conf-tab.active {
            background: var(--accent, #38bdf8);
            color: #111; 
            border-color: var(--accent, #38bdf8);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        /* Table Styles */
        .conf-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .conf-content.active {
            display: block;
        }

        .ratings-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .ratings-table th, .ratings-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border, rgba(255, 255, 255, 0.1));
        }

        .ratings-table th {
            background-color: rgba(0, 0, 0, 0.3);
            color: var(--text-muted, #cbd5e1);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .ratings-table tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .team-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: var(--text-main, #fff);
        }

        .team-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .rating-val {
            font-weight: bold;
            color: var(--accent, #38bdf8);
            font-size: 1.1rem;
        }

        /* Bracket Styles */
        .bracket-wrapper {
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 15px;
        }
        
        .bracket-wrapper h3 {
            color: var(--text-muted, #cbd5e1);
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .bracket {
            display: flex;
            flex-direction: row;
            gap: 30px;
            min-width: max-content;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 15px;
        }

        .match {
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
            border-radius: 6px;
            min-width: 150px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Bracket Status Highlighting */
        .team {
            padding: 10px 14px;
            font-size: 0.9rem;
            color: var(--text-main, #fff);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer; /* Makes it obvious you can click */
            transition: all 0.2s ease;
            border-left: 4px solid transparent; /* Placeholder for status border */
        }

        /* Highlight Classes */
        .pick-correct {
            background: rgba(34, 197, 94, 0.2) !important;
            border-left: 4px solid #22c55e !important;
        }

        .pick-wrong {
            background: rgba(239, 68, 68, 0.2) !important;
            border-left: 4px solid #ef4444 !important;
        }

        .pick-predicted {
            background: rgba(234, 179, 8, 0.2) !important;
            border-left: 4px solid #eab308 !important;
        }

        /* Status Legend / Key */
        .status-legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted, #cbd5e1);
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
        .win-prob {
            float: right;
            color: var(--accent, #38bdf8);
            font-size: 0.85em;
            font-weight: bold;
        }

        .team:last-child {
            border-bottom: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

            .replace(/-/g, '')       
            .replace(/\s+/g, '_');

        return 1 / (1 + Math.pow(10, (eloB - eloA) / 400));
    }

    function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        // Strip out the quotes after splitting
        return result.map(str => str.replace(/^"|"$/g, '')); 
    }
