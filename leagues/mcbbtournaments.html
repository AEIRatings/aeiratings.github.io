<script>
    // Helper to format the Team Name to match the exact logo filenames 
    function formatLogoName(teamName) {
        return teamName.toLowerCase()
            .replace(/&/g, '')       // Remove ampersands
            .replace(/\./g, '')      // Remove periods
            .replace(/'/g, '')       // Remove apostrophes
            .replace(/-/g, '')       // Remove dashes
            .replace(/\s+/g, '_');   // Replace spaces with underscores
    }

    // Equivalent to percentage.py function
    function calculateWinPercentage(eloA, eloB) {
        return 1 / (1 + Math.pow(10, (eloB - eloA) / 400));
    }

    document.addEventListener("DOMContentLoaded", async () => {
        try {
            // Fetch all data including the new brackets.json
            const [confResponse, ratingsResponse, bracketRes] = await Promise.all([
                fetch('../data/MCBBconferences.csv'),
                fetch('../data/mcbb.csv'),
                fetch('../data/brackets.json').catch(() => null) // Fails safely if missing
            ]);
            
            if (!confResponse.ok) throw new Error("Could not load MCBBconferences.csv");
            if (!ratingsResponse.ok) throw new Error("Could not load mcbb.csv");

            const confText = await confResponse.text();
            const ratingsText = await ratingsResponse.text();
            
            // Parse custom brackets if the file exists
            let bracketsConfig = {};
            if (bracketRes && bracketRes.ok) {
                try {
                    bracketsConfig = await bracketRes.json();
                } catch (e) {
                    console.warn("Could not parse brackets.json");
                }
            }

            // 1. Process MCBBconferences.csv (Team, Conference)
            const teamToConf = {};
            const conferences = new Set();
            const confLines = confText.split('\n').map(l => l.trim()).filter(l => l);
            
            const confStartIdx = confLines[0].toLowerCase().includes('team') ? 1 : 0;
            for (let i = confStartIdx; i < confLines.length; i++) {
                const parts = confLines[i].split(',');
                if (parts.length >= 2) {
                    const teamName = parts[0].trim();
                    const confName = parts[1].trim();
                    teamToConf[teamName] = confName;
                    conferences.add(confName);
                }
            }

            // 2. Process mcbb.csv (Team, Elo, Conference, RatingUpdated)
            const teamRatings = {};
            const ratingsLines = ratingsText.split('\n').map(l => l.trim()).filter(l => l);
            
            for (let i = 1; i < ratingsLines.length; i++) {
                const parts = ratingsLines[i].split(',');
                if (parts.length >= 2) {
                    const teamName = parts[0].trim();
                    const elo = parseFloat(parts[1].trim());
                    // Only store the Elo if it's a valid number
                    if (!isNaN(elo)) {
                        teamRatings[teamName] = elo;
                    }
                }
            }

            // 3. Merge Datasets Grouped by Conference
            const confData = {};
            for (const conf of conferences) {
                confData[conf] = [];
            }
            
            for (const [team, conf] of Object.entries(teamToConf)) {
                if (confData[conf]) {
                    const rawRating = teamRatings[team];
                    let displayRating = "Unrated";
                    let sortRating = -9999; // Default to negative so unrated teams sort to the bottom

                    // If they have a valid Elo number, format it
                    if (typeof rawRating === 'number') {
                        displayRating = rawRating.toFixed(2);
                        sortRating = rawRating;
                    }

                    confData[conf].push({
                        team: team,
                        rating: displayRating,
                        rawRating: sortRating
                    });
                }
            }

            // Sort tabs alphabetically
            const sortedConfs = Array.from(conferences).sort();

            const tabsContainer = document.getElementById('tabs-container');
            const contentContainer = document.getElementById('content-container');
            const bracketTemplates = document.getElementById('bracket-templates');

            // Mapping dictionary to assist if CSV names and structural class names vary
            const confMapping = {
                "atlantic 10": "a10",
                "big ten": "big 10",
                "mid-american": "mac",
                "northeast": "nec",
                "ohio valley": "ovc",
                "southeastern": "sec",
                "southwestern athletic": "swac",
                "western athletic": "wac",
                "atlantic coast": "acc",
                "coastal athletic": "caa",
                "conference usa": "cusa",
                "mid-eastern athletic": "meac",
                "missouri valley": "mvc",
                "west coast": "wcc"
            };

            // 4. Generate the DOM Elements
            sortedConfs.forEach((conf, index) => {
                // Sort teams within the conference by highest rating first
                confData[conf].sort((a, b) => b.rawRating - a.rawRating);

                const tabId = 'conf-tab-' + index;

                // Build the Tab button
                const tabElement = document.createElement('div');
                tabElement.className = 'conf-tab' + (index === 0 ? ' active' : '');
                tabElement.textContent = conf;
                
                // Tab click functionality
                tabElement.addEventListener('click', () => {
                    document.querySelectorAll('.conf-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.conf-content').forEach(c => c.classList.remove('active'));
                    tabElement.classList.add('active');
                    document.getElementById(tabId).classList.add('active');
                });
                
                tabsContainer.appendChild(tabElement);

                // Build the Table Content container
                const contentElement = document.createElement('div');
                contentElement.id = tabId;
                contentElement.className = 'conf-content' + (index === 0 ? ' active' : '');
                
                // Attempt to find matching bracket template
                let confLower = conf.toLowerCase().trim();
                let searchClass = confMapping[confLower] || confLower;
                let bracketHtml = "";
                
                for (const child of bracketTemplates.children) {
                    if (child.className === searchClass || child.className.replace(/\s+/g, ' ') === searchClass) {
                        
                        // NEW: Clone the template temporarily to apply custom data and colors
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = child.innerHTML;
                        
                        const customBracketData = bracketsConfig[searchClass];
                        
                        if (customBracketData) {
                            const teamNodes = tempDiv.querySelectorAll('.team');
                            customBracketData.forEach((teamData, idx) => {
                                if (teamNodes[idx]) {
                                    teamNodes[idx].textContent = teamData.name;
                                    if (teamData.color === 'green') teamNodes[idx].classList.add('highlight-green');
                                    if (teamData.color === 'red') teamNodes[idx].classList.add('highlight-red');
                                }
                            });
                        }

                        bracketHtml = `
                            <div class="bracket-wrapper">
                                <h3>${conf} Bracket Structure</h3>
                                ${tempDiv.innerHTML}
                            </div>
                        `;
                        break;
                    }
                }

                let tableHtml = bracketHtml + `
                    <table class="ratings-table">
                        <thead>
                            <tr>
                                <th>Seed</th>
                                <th>Team</th>
                                <th>Current Rating (Elo)</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                if (confData[conf].length === 0) {
                    tableHtml += `<tr><td colspan="3">No teams found for this conference.</td></tr>`;
                } else {
                    confData[conf].forEach((t, rank) => {
                        const logoSrc = `../logos/cfb/${formatLogoName(t.team)}.png`;
                        tableHtml += `
                            <tr>
                                <td>${rank + 1}</td>
                                <td>
                                    <div class="team-cell">
                                        <img src="${logoSrc}" class="team-logo" alt="${t.team} Logo" onerror="this.style.display='none'">
                                        <span>${t.team}</span>
                                    </div>
                                </td>
                                <td><span class="rating-val">${t.rating}</span></td>
                            </tr>
                        `;
                    });
                }
                
                tableHtml += `</tbody></table>`;
                contentElement.innerHTML = tableHtml;
                contentContainer.appendChild(contentElement);
            });

            // 5. Calculate and inject win percentages into the brackets
            document.querySelectorAll('#content-container .match').forEach(matchDiv => {
                const teamDivs = matchDiv.querySelectorAll('.team');
                if (teamDivs.length === 2) {
                    const teamA_name = teamDivs[0].textContent.trim();
                    const teamB_name = teamDivs[1].textContent.trim();

                    // Check if both teams actually have a valid Elo Rating from the CSV
                    const eloA = teamRatings[teamA_name];
                    const eloB = teamRatings[teamB_name];

                    if (typeof eloA === 'number' && typeof eloB === 'number') {
                        // Use percentage function equivalents
                        const probA = calculateWinPercentage(eloA, eloB);
                        const probB = calculateWinPercentage(eloB, eloA);

                        // Inject percentage back into the HTML (Preserving the color classes)
                        teamDivs[0].innerHTML = `${teamA_name} <span class="win-prob">${(probA * 100).toFixed(1)}%</span>`;
                        teamDivs[1].innerHTML = `${teamB_name} <span class="win-prob">${(probB * 100).toFixed(1)}%</span>`;
                    }
                }
            });

        } catch (error) {
            console.error("Error loading tournament data:", error);
            document.getElementById('content-container').innerHTML = 
                `<p style="color:#ef4444; text-align:center;">Error loading data. Ensure that <strong>MCBBconferences.csv</strong> and <strong>mcbb.csv</strong> exist inside the <em>data</em> folder.</p>`;
        }
    });
</script>
